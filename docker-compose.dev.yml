version: "3.9"

services:

  backend:
    image: maven:3.9-eclipse-temurin-21
    container_name: forgetask-backend-dev
    working_dir: /app
    volumes:
      - ./forgetask:/app
      - ${HOME:-${USERPROFILE}}/.m2:/root/.m2
      - ./forgetask/wallet:/wallet
    command: mvn spring-boot:run
    ports:
      - "8080:8080"
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      TNS_ADMIN: /wallet
      TELEGRAM_BOT_ENABLED: ${TELEGRAM_BOT_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME:-}
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
    networks:
      - forgetask-net

  frontend:
    image: node:20-alpine
    container_name: forgetask-frontend-dev
    working_dir: /app
    volumes:
      - ./forgetask-frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend
    networks:
      - forgetask-net

networks:
  forgetask-net:
    driver: bridge