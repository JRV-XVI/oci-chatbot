version: 0.1
component: build
timeoutInSeconds: 3600

# ============================================
# BUILD SPEC SIMPLIFICADO para OCI DevOps
# ============================================
# Reemplaza los OCID con los valores reales
# de los secretos que creaste en OCI Vault
# ============================================

env:
  variables:
    # Construir el registry string
    OCI_WORK_DIR: "/workspace"
    
  vaultVariables:
    # ⚠️ CAMBIAR ESTOS OCID POR LOS REALES
    OCIR_REGION: "ocid1.vaultsecret.oc1.us-ashburn-1.aaaaaaaayourregionsecretid"
    OCIR_NAMESPACE: "ocid1.vaultsecret.oc1.us-ashburn-1.aaaaaaaayournamespaceecretid"
    OCIR_USERNAME: "ocid1.vaultsecret.oc1.us-ashburn-1.aaaaaaaayourusernamesecretid"
    OCIR_TOKEN: "ocid1.vaultsecret.oc1.us-ashburn-1.aaaaaaaayourtokensecretid"

steps:
  - displayName: "Preparar entorno"
    type: Command
    command: |
      set -ex
      echo "=== OCI DevOps CI/CD Build ==="
      echo "Directory: $(pwd)"
      echo "Files:"
      ls -la infrastructure/scripts/deploy/
      
  - displayName: "Construir DOCKER_REGISTRY"
    type: Command
    command: |
      export DOCKER_REGISTRY="${OCIR_REGION}.ocir.io/${OCIR_NAMESPACE}"
      echo "Registry será: $DOCKER_REGISTRY"
      
  - displayName: "Ejecutar build.sh"
    type: Command
    command: |
      set -ex
      
      # Exportar variables para que el script las vea
      export DOCKER_REGISTRY="${OCIR_REGION}.ocir.io/${OCIR_NAMESPACE}"
      
      # Ejecutar el script
      cd ${OCI_WORK_DIR}
      chmod +x infrastructure/scripts/deploy/local-build.sh
      bash infrastructure/scripts/deploy/local-build.sh
      
    timeoutInSeconds: 2400

  - displayName: "Verificación final"
    type: Command
    command: |
      echo "========================================="
      echo "✓ Build Completado"
      echo "========================================="
      echo ""
      echo "Imágenes pusheadas a OCIR:"
      echo "  • ${OCIR_REGION}.ocir.io/${OCIR_NAMESPACE}/forgetask:latest"
      echo "  • ${OCIR_REGION}.ocir.io/${OCIR_NAMESPACE}/forgetask-frontend:latest"
      echo ""
      echo "Próximos pasos:"
      echo "  1. Actualizar deployment en Kubernetes"
      echo "  2. Verificar en OCI Console > Registry"
