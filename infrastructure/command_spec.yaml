version: 0.1
component: command
timeoutInSeconds: 3600
shell: bash

env:
  variables:
    BUILDRUN_HASH: "latest"
    JOB_NAMESPACE: "mtdrworkshop"
    OCIR_REGION: "mx-queretaro-1"
    OCIR_NAMESPACE: "axpqjhfdooxb"
    GITHUB_OWNER: "JRV-XVI"
    GITHUB_REPO: "oci-chatbot"
    GITHUB_PROJECT_ID: "5"
    OKE_ENDPOINT: "https://159.54.150.206:6443"
    E2E_TIMEOUT_SECONDS: "1800"
    INTERVAL: "15"
  vaultVariables:
    OKE_SA_TOKEN: "ocid1.vaultsecret.oc1.mx-queretaro-1.amaaaaaa35eq2aiao3ai7nhgak5rmeykaccjrhxvt4b3uo32f3ivlzll7gna"
    GITHUB_TOKEN: "ocid1.vaultsecret.oc1.mx-queretaro-1.amaaaaaa35eq2aiagb5n22fmepwuiarxnconu6nu5lxwqmho6bcfawesdejq"

inputArtifacts:
  - name: shell-assets
    type: GENERIC_ARTIFACT
    registryId: "ocid1.artifactrepository.oc1.mx-queretaro-1.0.amaaaaaa35eq2aia546qxfysx6kquaozdtfsbaui2ktxmzflu7nkuovnyhrq"
    path: "shell-assets.zip"
    version: "latest"
    location: "/workspace/shell-assets.zip"

steps:
  - type: Command
    name: "Resolver BUILDRUN_HASH"
    timeoutInSeconds: 60
    command: |
      set -e
      echo "Resolviendo BUILDRUN_HASH desde Artifact Registry..."
      BUILDRUN_HASH=$(oci artifacts generic artifact list \
        --repository-id "ocid1.artifactrepository.oc1.mx-queretaro-1.0.amaaaaaa35eq2aia546qxfysx6kquaozdtfsbaui2ktxmzflu7nkuovnyhrq" \
        --artifact-path "shell-assets.zip" \
        --compartment-id "ocid1.compartment.oc1..aaaaaaaanic2e7sewrc36tj7mrakkmk2nct2icng7kkuw4qvyktieegxz33a" \
        --sort-by timeCreated \
        --sort-order DESC \
        --limit 1 \
        --query 'data.items[0].version' \
        --raw-output 2>/dev/null)

      if [ -z "$BUILDRUN_HASH" ]; then
        echo "ERROR: No se pudo resolver BUILDRUN_HASH"
        exit 1
      fi

      export BUILDRUN_HASH
      echo "BUILDRUN_HASH resuelto: ${BUILDRUN_HASH}"

  - type: Command
    name: "Instalar kubectl"
    timeoutInSeconds: 180
    command: |
      set -e
      KUBECTL_VERSION="$(curl -sL https://dl.k8s.io/release/stable.txt)"
      curl -LO "https://dl.k8s.io/release/$KUBECTL_VERSION/bin/linux/amd64/kubectl"
      chmod +x kubectl
      mv kubectl /usr/local/bin/kubectl
      kubectl version --client

  - type: Command
    name: "Configurar acceso al cluster"
    timeoutInSeconds: 120
    command: |
      set -e
      kubectl config set-cluster oke-cluster \
        --server="$OKE_ENDPOINT" \
        --insecure-skip-tls-verify=true
      kubectl config set-credentials e2e-runner \
        --token="$OKE_SA_TOKEN"
      kubectl config set-context e2e-context \
        --cluster=oke-cluster \
        --user=e2e-runner
      kubectl config use-context e2e-context
      kubectl get namespace "$JOB_NAMESPACE"

  - type: Command
    name: "Preparar scripts"
    command: |
      set -e
      ZIP_PATH=$(find /workspace -type f -name "shell-assets.zip" 2>/dev/null | head -n 1)
      if [ -z "$ZIP_PATH" ]; then
        ZIP_PATH=$(find / -type f -name "shell-assets.zip" \
          -not -path "/proc/*" -not -path "/sys/*" -not -path "/dev/*" \
          2>/dev/null | head -n 1)
      fi
      if [ -z "$ZIP_PATH" ]; then
        echo "ERROR: No se encontró shell-assets.zip"
        exit 1
      fi
      mkdir -p /workspace/shell-assets
      unzip -o "$ZIP_PATH" -d /workspace/shell-assets
      chmod +x /workspace/shell-assets/scripts/e2e-run.sh
      ls -l /workspace/shell-assets/scripts/

  - type: Command
    name: "Ejecutar E2E y validar"
    timeoutInSeconds: 3000
    command: |
      set -e
      echo "Iniciando ejecución principal del orquestador e2e-run.sh..."
      if ! /workspace/shell-assets/scripts/e2e-run.sh; then
        echo "ERROR CRÍTICO: La validación E2E ha fallado."
        exit 1
      fi
      echo "Validación finalizada correctamente."