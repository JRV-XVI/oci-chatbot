version: 0.1
component: build
timeoutInSeconds: 3600

env:
  # Variables de entorno estáticas
  variables:
    DOCKER_REGISTRY: "${OCIR_REGION}.ocir.io/${OCIR_NAMESPACE}"
    
  # Secretos desde OCI Vault (referenciar por OCID)
  vaultVariables:
    OCIR_REGION: "ocid1.vault.oc1.region...."  # Reemplazar con el OCID del secreto
    OCIR_NAMESPACE: "ocid1.vault.oc1.region...."  # Reemplazar con el OCID del secreto
    OCIR_USERNAME: "ocid1.vault.oc1.region...."  # Reemplazar con el OCID del secreto
    OCIR_TOKEN: "ocid1.vault.oc1.region...."  # Reemplazar con el OCID del secreto (SENSIBLE)

steps:
  - displayName: "Validar variables requeridas"
    type: Command
    command: |
      if [ -z "$OCIR_REGION" ] || [ -z "$OCIR_NAMESPACE" ] || \
         [ -z "$OCIR_USERNAME" ] || [ -z "$OCIR_TOKEN" ]; then
        echo "Error: Variables de OCIR no configuradas correctamente"
        exit 1
      fi
      echo "✓ Variables de OCIR validadas"
      echo "Registry: ${DOCKER_REGISTRY}"

  - displayName: "Ejecutar build script"
    type: Command
    command: |
      cd ${OCI_WORK_DIR}
      chmod +x infrastructure/scripts/deploy/local-build.sh
      bash infrastructure/scripts/deploy/local-build.sh
    timeoutInSeconds: 2400

  - displayName: "Verificar imágenes pusheadas"
    type: Command
    command: |
      echo "✓ Build completado exitosamente"
      echo "Imágenes disponibles en OCIR:"
      echo "  - ${DOCKER_REGISTRY}/forgetask:latest"
      echo "  - ${DOCKER_REGISTRY}/forgetask-frontend:latest"

outputArtifacts:
  - name: build_output
    location: target/
