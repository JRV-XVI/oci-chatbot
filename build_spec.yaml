version: 0.1
component: build
timeoutInSeconds: 3600
shell: bash

env:
  vaultVariables:
    OCIR_REGION: ocid1.vaultsecret.oc1.mx-queretaro-1.amaaaaaa35eq2aiae6geztxgzbvt52jj6zsfh6tkkdzi4py23zw3grimh2pa
    OCIR_NAMESPACE: ocid1.vaultsecret.oc1.mx-queretaro-1.amaaaaaa35eq2aia46b7hp5p46gzn3u6xgl7mkzmbkle4xwxexie54uex3kq
    OCIR_USERNAME: ocid1.vaultsecret.oc1.mx-queretaro-1.amaaaaaa35eq2aianyxgjmjngc4p5fcrxgcdayn3ih72zcktvgmqfxll7cta
    OCIR_TOKEN: ocid1.vaultsecret.oc1.mx-queretaro-1.amaaaaaa35eq2aia7g7mpayfp7xbhetiblaowbpu5nzzyhw3rbvez6y5hhyq

  exportedVariables:
    - BUILDRUN_HASH

steps:
  - displayName: "Generar BUILDRUN_HASH"
    type: Command
    command: |
      BUILDRUN_HASH=$(echo "${OCI_BUILD_RUN_ID}" | tail -c 8 | tr -d '\n')
      echo "BUILDRUN_HASH=${BUILDRUN_HASH}"
      export BUILDRUN_HASH

  - displayName: "CI Build y Push a OCIR"
    type: Command
    command: |
      chmod +x ${OCI_PRIMARY_SOURCE_DIR}/infrastructure/scripts/deploy/ci-build.sh
      bash ${OCI_PRIMARY_SOURCE_DIR}/infrastructure/scripts/deploy/ci-build.sh
    timeoutInSeconds: 2400

  - displayName: "Empaquetar scripts de E2E"
    type: Command
    command: |
      cd ${OCI_PRIMARY_SOURCE_DIR}/infrastructure/shell
      zip -r ../../shell-assets.zip .
      cd ${OCI_PRIMARY_SOURCE_DIR}

  - displayName: "Trigger Deployment Pipeline"
    type: Command
    command: |
      if ! command -v oci &>/dev/null; then
        echo "Instalando OCI CLI..."
        curl -sL https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh | \
          bash -s -- --accept-all-defaults
        export PATH="$HOME/bin:$PATH"
      fi

      echo "Disparando deployment con BUILDRUN_HASH=${BUILDRUN_HASH}..."
      oci devops deployment create-pipeline-deployment \
        --pipeline-id "ocid1.devopsdeploypipeline.oc1.mx-queretaro-1.amaaaaaa35eq2aiaxk3uw4h3op2zp62gprn6ynt45d5ph6pcujjtul5ekuka" \
        --deployment-arguments "{\"items\":[{\"name\":\"BUILDRUN_HASH\",\"value\":\"${BUILDRUN_HASH}\"}]}" \
        --display-name "deploy-${BUILDRUN_HASH}"

outputArtifacts:
  - name: forgetask_backend_image
    type: DOCKER_IMAGE
    location: mx-queretaro-1.ocir.io/axpqjhfdooxb/forgetask/mjmnu/forgetask:${BUILDRUN_HASH}

  - name: forgetask_frontend_image
    type: DOCKER_IMAGE
    location: mx-queretaro-1.ocir.io/axpqjhfdooxb/forgetask/mjmnu/forgetask-frontend:${BUILDRUN_HASH}

  - name: forgetask_e2e_tests_image
    type: DOCKER_IMAGE
    location: mx-queretaro-1.ocir.io/axpqjhfdooxb/forgetask/mjmnu/forgetask-e2e-tests:${BUILDRUN_HASH}

  - name: forgetask_oke_manifest
    type: BINARY
    location: ${OCI_PRIMARY_SOURCE_DIR}/oci-oke-deployment.yaml

  - name: forgetask_shell_command_spec
    type: BINARY
    location: ${OCI_PRIMARY_SOURCE_DIR}/infrastructure/command_spec.yaml

  - name: forgetask_shell_assets
    type: BINARY
    location: ${OCI_PRIMARY_SOURCE_DIR}/shell-assets.zip